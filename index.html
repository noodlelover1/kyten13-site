<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Kyten13 </title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #000;
      }

      canvas {
        display: block;
      }

      .overlay {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: rgba(0, 255, 70, 0.1);
        font-family: monospace;
        /*  font-size: 2rem; */
        pointer-events: none;
        z-index: 10;
      }

      .central {
        z-index: 100;
        background-color: rgba(0, 0, 0, 0.7);
        padding: 20px;
        width: 70vw;
        max-width: 500;
        border-radius: 25px;
        text-align: center;
        color: rgba(255, 255, 255, 0.55);
      }

      .title {
        font-size: 2rem;
        font-weight: 1;
      }

      a {
        color: rgba(255, 255, 255, 0.55);
      }
      button {
        background-color: rgba(0, 0, 0, 0);
        border: none;
        color: rgba(255, 255, 255, 0.55);
        cursor: pointer;
      }

      .secret {
        color: rgba(255, 255, 255, 1);
        border: 1px dashed blue;
        min-height: 20px;
        z-index: 1000;
      }
    </style>
  </head>
  <body>
    <canvas id="matrixCanvas"></canvas>
    <div class="overlay">
      <div class="central">
        <h1 class="title"> Kyten13 </h1>
        <p> Streaming Fragpunk, Valorant, Overwatch … </p>
        <p>
          <i class="fa-brands fa-twitch"></i>
          <a href="https://twitch.tv/Kyten13">Twitch</a>
          <br>
          <i class="fa-brands fa-youtube"></i>
          <a href="https://www.youtube.com/@Kyten13-EUW">YouTube</a>
        </p>
        <p>
          <button onclick="showSecret()">secret</button>
          <p id="secret" class="secret"></p>
        </p>
      </div>
    </div>
    <script>
      const canvas = document.getElementById('matrixCanvas');
      const ctx = canvas.getContext('2d');

      function showSecret() {
        document.getElementById("secret").textContent="the name of kyten's dog is Orion";
      }
      
      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();
      const chars = 'アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロヲゴゾドボポ 0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      const charArray = chars.split('');
      const fontSize = 14;
      let columns = canvas.width / fontSize;
      let drops = [];
      for (let i = 0; i < columns; i++) {
        drops[i] = 1;
      }

      function draw() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = fontSize + 'px monospace';
        for (let i = 0; i < drops.length; i++) {
          const text = charArray[Math.floor(Math.random() * charArray.length)];
          ctx.fillStyle = 'rgba(0, 255, 70, 0.4)';
          ctx.fillText(text, i * fontSize, drops[i] * fontSize);
          if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
            drops[i] = 0;
          }
          drops[i] += 0.5 + Math.random() * 0.5;
        }
      }
      setInterval(draw, 35);
    </script>
  </body>
</html>
