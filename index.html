<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kyten13</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #000;
        -webkit-tap-highlight-color: transparent;
      }
      canvas {
        display: block;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 1;
      }
      .overlay {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: rgba(0, 255, 70, 0.1);
        font-family: monospace;
        pointer-events: none;
        z-index: 10;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .central {
        z-index: 100;
        background-color: rgba(0, 0, 0, 0.9);
        padding: 25px;
        width: 80%;
        max-width: 450px;
        border-radius: 20px;
        text-align: center;
        color: rgba(255, 255, 255, 0.8);
        box-shadow: 0 0 20px rgba(0, 255, 70, 0.2);
        pointer-events: auto;
      }
      .title {
        font-size: 2rem;
        font-weight: bold;
        margin-bottom: 10px;
        color: #00ff44;
      }
      a {
        color: rgba(255, 255, 255, 0.8);
        text-decoration: none;
        font-size: 1.1rem;
      }
      button {
        background-color: rgba(0, 255, 70, 0.2);
        border: 1px solid #00ff44;
        color: #00ff44;
        padding: 10px 20px;
        font-size: 1rem;
        border-radius: 8px;
        margin-top: 15px;
        cursor: pointer;
        transition: all 0.2s;
        -webkit-appearance: none;
      }
      button:active {
        background-color: #00ff44;
        color: #000;
        transform: scale(0.95);
      }
      .secret {
        color: #00ff44 !important;
        font-weight: bold;
        font-size: 1.3rem;
        margin-top: 15px;
        min-height: 1.5em;
        opacity: 1 !important;
        text-shadow: 0 0 5px rgba(0, 255, 68, 0.5);
        word-wrap: break-word;
      }
    </style>
  </head>
  <body>
    <canvas id="matrixCanvas"></canvas>
    <div class="overlay">
      <div class="central">
        <h1 class="title">Kyten13</h1>
        <p>Streaming Fragpunk, Valorant, Overwatch …</p>
        <p>
          <i class="fa-brands fa-twitch"></i>
          <a href="https://twitch.tv/Kyten13">Twitch</a>
          <br>
          <i class="fa-brands fa-youtube"></i>
          <a href="https://www.youtube.com/@Kyten13-EUW">YouTube</a>
        </p>
        <button id="secretBtn">secret</button>
        <p id="secret" class="secret"></p>
      </div>
    </div>
    <script>
      function showSecret() {
        const secretEl = document.getElementById("secret");
        if (secretEl) {
          secretEl.textContent = "the name of kyten's dog is Orion";
          secretEl.style.display = "block";
        }
        setTimeout(function() {
          alert("Secret revealed!\nThe name of kyten's dog is Orion");
        }, 100);
      }
      document.addEventListener('DOMContentLoaded', function() {
        const btn = document.getElementById('secretBtn');
        if (btn) {
          btn.addEventListener('click', showSecret);
          btn.addEventListener('touchstart', function(e) {
            e.preventDefault();
            showSecret();
          }, { passive: false });
        }
      });
      const canvas = document.getElementById('matrixCanvas');
      const ctx = canvas.getContext('2d');
      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();
      const chars = 'アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロヲゴゾドボポ 0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      const charArray = chars.split('');
      const fontSize = 14;
      let columns = canvas.width / fontSize;
      let drops = [];
      for (let i = 0; i < columns; i++) {
        drops[i] = 1;
      }
      function draw() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = fontSize + 'px monospace';
        for (let i = 0; i < drops.length; i++) {
          const text = charArray[Math.floor(Math.random() * charArray.length)];
          ctx.fillStyle = 'rgba(0, 255, 70, 0.4)';
          ctx.fillText(text, i * fontSize, drops[i] * fontSize);
          if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
            drops[i] = 0;
          }
          drops[i] += 0.5 + Math.random() * 0.5;
        }
      }
      setInterval(draw, 35);
    </script>
  </body>
</html>
