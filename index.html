<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Kyten13 </title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #000;
      }

      canvas {
        display: block;
      }

      .overlay {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: rgba(0, 255, 70, 0.1);
        font-family: monospace;
        pointer-events: none;
        z-index: 10;
      }

      .central {
        z-index: 100;
        background-color: rgba(0, 0, 0, 0.7);
        padding: 20px;
        width: 70vw;
        max-width: 500;
        border-radius: 25px;
        text-align: center;
        color: rgba(255, 255, 255, 0.55);
        pointer-events: auto;
      }

      .title {
        font-size: 2rem;
        font-weight: 1;
      }

      a {
        color: rgba(255, 255, 255, 0.55);
      }

      button {
        background-color: rgba(0, 0, 0, 0);
        border: none;
        color: rgba(255, 255, 255, 0.55);
        padding: 5px 10px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 1rem;
        transition: background-color 0.2s, color 0.2s;
        -webkit-tap-highlight-color: transparent;
      }

      button:hover {
        background-color: rgba(255, 255, 255, 0.05);
      }

      button:active {
        background-color: rgba(255, 255, 255, 0.1);
        color: #fff;
        transform: scale(0.98);
      }

      .secret {
        color: rgba(255, 255, 255, 0.55);
        min-height: 1.2em;
        margin-top: 10px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <canvas id="matrixCanvas"></canvas>
    <div class="overlay">
      <div class="central">
        <h1 class="title"> Kyten13 </h1>
        <p> Streams Fragpunk, Valorant, Overwatch … </p>
        <p>
          <i class="fa-brands fa-twitch"></i>
          <a href="https://twitch.tv/Kyten13">Twitch</a>
          <br>
          <i class="fa-brands fa-youtube"></i>
          <a href="https://www.youtube.com/@Kyten13-EUW">YouTube</a>
        </p>
        <p>
          <button id="secretBtn">secret</button>
          <p id="secret" class="secret"></p>
        </p>
      </div>
    </div>
    <script>
      const canvas = document.getElementById('matrixCanvas');
      const ctx = canvas.getContext('2d');

      function showSecret() {
        var element = document.getElementById("secret");
        if (element) {
          element.textContent = "the name of kyten's dog is Orion";
        }
      }

      document.addEventListener('DOMContentLoaded', function() {
        var btn = document.getElementById('secretBtn');
        if (btn) {
          btn.addEventListener('click', showSecret);
          btn.addEventListener('touchstart', function(e) {
            e.preventDefault();
            showSecret();
          }, { passive: false });
        }
      });

      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();
      const chars = 'アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロヲゴゾドボポ 0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      const charArray = chars.split('');
      const fontSize = 14;
      let columns = canvas.width / fontSize;
      let drops = [];
      for (var i = 0; i < columns; i++) {
        drops[i] = 1;
      }

      function draw() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = fontSize + 'px monospace';
        for (var i = 0; i < drops.length; i++) {
          var text = charArray[Math.floor(Math.random() * charArray.length)];
          ctx.fillStyle = 'rgba(0, 255, 70, 0.4)';
          ctx.fillText(text, i * fontSize, drops[i] * fontSize);
          if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
            drops[i] = 0;
          }
          drops[i] += 0.5 + Math.random() * 0.5;
        }
      }
      setInterval(draw, 35);
    </script>
    <script src="//cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
  </body>
</html>
