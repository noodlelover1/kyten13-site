name: "Mirror to codeberg"

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  
jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
        - uses: actions/checkout@v3
          with:
            fetch-depth: 0
        - uses: yesolutions/mirror-action@master
          with:
            REMOTE: 'https://codeberg.org/noodlelover1/kyten13-site.git'
            GIT_USERNAME: noodlelover1
            GIT_PASSWORD: ${{ secrets.GIT_PASSWORD }}
